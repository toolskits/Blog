---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <p>Published on {{ page.date | date: "%B %d, %Y" }}</p>
  {% if page.categories %}
    <p>Categories:
      {% for cat in page.categories %}
        <a href="{{ '/categories.md#' | append: cat | relative_url }}">{{ cat }}</a>
        {% unless forloop.last %}, {% endunless %}
      {% endfor %}
    </p>
  {% endif %}
  <div>{{ content }}</div>
</article>
