---
layout: default
---
<h1>Posts in {{ page.title | capitalize }}</h1>
<ul>
  {% for post in site.categories[page.title] %}
    <li>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a> -
      <span class="date">{{ post.date | date: "%b %d, %Y" }}</span>
    </li>
  {% endfor %}
</ul>
